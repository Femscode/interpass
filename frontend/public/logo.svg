      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="100%" stop-color="#0077b6" />
    </linearGradient>
    <linearGradient id="checkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ff66" />
