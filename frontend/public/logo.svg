    </linearGradient>
  </defs>
  
  <!-- Sleek modern speech bubble outline -->
  <path d="M 20 20 H 80 C 85.5 20, 90 24.5, 90 30 V 65 C 90 70.5, 85.5 75, 80 75 H 42 L 25 88 V 75 H 20 C 14.5 75, 10 70.5, 10 65 V 30 C 10 24.5, 14.5 20, 20 20 Z" 
